services:
  - type: web
    name: fertipath
    runtime: static
    rootDir: .
    autoDeploy: true
    branch: main
    # Flutter web build with error handling
    buildCommand: |
      curl -L https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.38.0-stable.tar.xz -o flutter.tar.xz &&
      tar xf flutter.tar.xz &&
      export PATH="$PATH:$(pwd)/flutter/bin" &&
      flutter --version &&
      flutter config --enable-web &&
      flutter pub get &&
      flutter pub upgrade &&
      flutter build web --release --web-renderer html --dart-define=API_URL=https://fertipath-backend.onrender.com 2>&1 | tee build.log &&
      echo "Web build completed successfully"
    staticPublishPath: build/web
    envVars:
      - key: API_URL
        value: "https://fertipath-backend.onrender.com"
    headers:
      - path: "/*"
        name: "Cache-Control"
        value: "public, max-age=3600"
      - path: "/index.html"
        name: "Cache-Control"
        value: "public, max-age=60"
      - path: "/*"
        name: "Access-Control-Allow-Origin"
        value: "*"
